services:
  whisperx-asr:
    # Build from source for development
    build:
      context: .
      dockerfile: Dockerfile

    container_name: whisperx-asr-api-dev
    restart: unless-stopped

    # GPU configuration
    # Uses GPU 0 by default. To pin to a different GPU, create
    # docker-compose.dev.local.yml (gitignored) with NVIDIA_VISIBLE_DEVICES.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "9000:9000"
      - "${RAY_DASHBOARD_PORT:-8265}:8265"

    shm_size: '8g'

    environment:
      # Suppress pyannote's torchcodec UserWarning in all processes (including Ray workers)
      - PYTHONWARNINGS=ignore::UserWarning
      # All values loaded from .env file
      - DEVICE=${DEVICE:-cuda}
      - COMPUTE_TYPE=${COMPUTE_TYPE:-float16}
      - BATCH_SIZE=${BATCH_SIZE:-16}
      - HF_TOKEN=${HF_TOKEN}
      - CACHE_DIR=${CACHE_DIR:-/.cache}
      - HF_HOME=${CACHE_DIR:-/.cache}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-}
      - NLTK_DATA=/.cache/nltk_data
      - PRELOAD_MODEL=${PRELOAD_MODEL:-}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-1000}
      - SERVE_MODE=${SERVE_MODE:-simple}
      - PIPELINE_STRATEGY=${PIPELINE_STRATEGY:-replicate}
      - WHISPER_BATCH_SIZE=${WHISPER_BATCH_SIZE:-4}
      - ALIGN_BATCH_SIZE=${ALIGN_BATCH_SIZE:-8}
      - DIARIZE_BATCH_SIZE=${DIARIZE_BATCH_SIZE:-2}
      - BATCH_WAIT_TIMEOUT=${BATCH_WAIT_TIMEOUT:-0.1}
      - WHISPER_GPU_FRACTION=${WHISPER_GPU_FRACTION:-0.5}
      - ALIGN_GPU_FRACTION=${ALIGN_GPU_FRACTION:-0.3}
      - DIARIZE_GPU_FRACTION=${DIARIZE_GPU_FRACTION:-0.2}
      - NUM_GPU_REPLICAS=${NUM_GPU_REPLICAS:-1}
      - WHISPER_NUM_REPLICAS=${WHISPER_NUM_REPLICAS:-}
      - ALIGN_NUM_REPLICAS=${ALIGN_NUM_REPLICAS:-}
      - DIARIZE_NUM_REPLICAS=${DIARIZE_NUM_REPLICAS:-}
      - GPU_CONCURRENCY=${GPU_CONCURRENCY:-1}

    volumes:
      # Persistent cache for models (recommended)
      - whisperx-cache:/.cache

      # Mount local app directory for live code changes during development
      - ./app:/workspace/app
      - ./entrypoint.sh:/workspace/entrypoint.sh

    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; requests.get('http://localhost:9000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  whisperx-cache:
    driver: local
